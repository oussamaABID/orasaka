<svg width="680" height="460" viewBox="0 0 680 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="preview-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <!-- Clean Shadow -->
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.04" />
    </filter>

    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      .ui-font { font-family: 'Inter', sans-serif; }

      /* Pulse facial detection alignment outline */
      @keyframes outline-pulse {
        0%, 100% { stroke-opacity: 0.3; stroke-width: 1; }
        50% { stroke-opacity: 0.8; stroke-width: 1.5; }
      }
      .facial-align-box { animation: outline-pulse 2s infinite ease-in-out; }
    ]]></style>
  </defs>

  <!-- Frame Background -->
  <rect width="680" height="460" rx="16" fill="#f8fafc" />
  <rect x="0.5" y="0.5" width="679" height="459" rx="15.5" stroke="#e2e8f0" stroke-width="1" />

  <!-- Window Header -->
  <rect x="0" y="0" width="680" height="44" rx="16" fill="#f1f5f9" />
  <rect x="0" y="24" width="680" height="20" fill="#f1f5f9" />
  <line x1="0" y1="44" x2="680" y2="44" stroke="#e2e8f0" stroke-width="1" />

  <!-- Window Controls -->
  <circle cx="20" cy="22" r="5" fill="#ff5f56" />
  <circle cx="36" cy="22" r="5" fill="#ffbd2e" />
  <circle cx="52" cy="22" r="5" fill="#27c93f" />

  <!-- Title bar header text -->
  <text x="340" y="27" class="ui-font" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Scene &amp; Sports Insertion Studio</text>

  <!-- Left Configuration Panel -->
  <g transform="translate(20, 68)" class="ui-font">
    <rect width="270" height="372" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#soft-shadow)" />
    
    <!-- Video reel/clip path icon -->
    <path d="M 18,22 H 30 V 30 H 18 Z M 30,24 L 34,22 V 30 L 30,28 Z" stroke="#4f46e5" stroke-width="1.5" stroke-linejoin="round" fill="none" />
    <text x="42" y="28" font-size="13" font-weight="700" fill="#4f46e5">Scene Parameters</text>

    <!-- User Media upload placeholder -->
    <text x="18" y="52" font-size="10.5" fill="#475569">Your Portrait Source</text>
    <rect x="18" y="62" width="234" height="44" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Mini face avatar vector -->
    <circle cx="40" cy="84" r="14" fill="url(#brand-grad)" />
    <circle cx="40" cy="80" r="4.5" fill="#ffffff" />
    <path d="M 32,92 C 32,88 35,86 40,86 C 45,86 48,88 48,92" fill="#ffffff" />

    <text x="64" y="80" font-size="11.5" font-weight="600" fill="#0f172a">john-doe-face.mp4</text>
    <text x="64" y="93" font-size="9.5" fill="#059669">✓ Profile asset loaded (1080p, 24fps)</text>

    <!-- Scene selector -->
    <text x="18" y="128" font-size="10.5" fill="#475569">Target Film / Sports Scene</text>
    <rect x="18" y="138" width="234" height="30" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="30" y="157" font-size="11" font-weight="600" fill="#0f172a">🏎️ F1 Podium Finish (Sports)</text>
    <!-- Dropdown indicator vector -->
    <path d="M 226,152 L 230,156 L 234,152" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" fill="none" />

    <!-- Text prompt -->
    <text x="18" y="190" font-size="10.5" fill="#475569">AI Insertion Prompt Instruction</text>
    <rect x="18" y="200" width="234" height="74" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="26" y="218" font-size="10" fill="#0f172a">Insert my face onto the winning F1 driver</text>
    <text x="26" y="232" font-size="10" fill="#0f172a">on the podium, wearing a red racing suit,</text>
    <text x="26" y="246" font-size="10" fill="#0f172a">champagne spraying, cinematic light, 4k.</text>
    <text x="26" y="260" font-size="9.5" fill="#64748b">Model: sd-xl + ltx-video-v2</text>

    <!-- Model setting -->
    <text x="18" y="294" font-size="10.5" fill="#475569">Render Hardware Profile</text>
    <rect x="18" y="304" width="234" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <text x="28" y="318" font-size="9.5" font-weight="600" fill="#7c3aed">Orasaka Local GPU Runner (port:8086)</text>

    <!-- Render Button -->
    <rect x="18" y="334" width="234" height="28" rx="8" fill="url(#brand-grad)" />
    <!-- Render Icon path -->
    <polygon points="98,343 98,353 106,348" fill="#ffffff" />
    <text x="160" y="352" font-size="11.5" font-weight="800" fill="#ffffff" text-anchor="middle">Generate &amp; Insert Scene</text>
  </g>

  <!-- Right Player / Generation Viewport -->
  <g transform="translate(310, 68)" class="ui-font">
    <rect width="350" height="270" rx="12" fill="url(#preview-bg)" stroke="#e2e8f0" stroke-width="1" filter="url(#soft-shadow)" />
    
    <!-- Live screen viewport boundary -->
    <rect x="18" y="18" width="314" height="190" rx="10" fill="#09090f" />

    <!-- Simulated Scene Frame: F1 Driver on Podium with Bounding Box detection -->
    <!-- Racing Suit Mockup -->
    <path d="M 125,208 L 225,208 L 205,150 L 145,150 Z" fill="#e50914" opacity="0.85" />
    <!-- Helmet / Face area -->
    <circle cx="175" cy="120" r="32" fill="#3b3b4f" opacity="0.9" />
    <circle cx="175" cy="120" r="28" fill="url(#brand-grad)" opacity="0.6" />
    <!-- Bounding alignment box -->
    <rect class="facial-align-box" x="141" y="86" width="68" height="68" rx="6" fill="none" stroke="#0ea5e9" stroke-width="1.5" />
    <text x="175" y="80" font-size="8.5" font-weight="700" fill="#0ea5e9" text-anchor="middle">ALIGNING FACE: 98.4%</text>

    <!-- Laser scanning bar sweep effect (using native coordinate animation to prevent translate conflicts) -->
    <rect x="18" y="18" width="314" height="2" fill="#0ea5e9" opacity="0.75">
      <animate attributeName="y" values="18;198;18" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- Progress Timeline player controls -->
    <g transform="translate(18, 220)">
      <!-- Progress Bar Track -->
      <rect x="0" y="6" width="238" height="4" rx="2" fill="#cbd5e1" />
      <!-- Active rendered track -->
      <rect x="0" y="6" width="140" height="4" rx="2" fill="url(#brand-grad)" />
      <!-- Animated Playhead line (using native coordinate animation) -->
      <line y1="2" y2="14" stroke="#475569" stroke-width="2">
        <animate attributeName="x1" values="0;238;0" dur="6s" repeatCount="indefinite" />
        <animate attributeName="x2" values="0;238;0" dur="6s" repeatCount="indefinite" />
      </line>
      
      <!-- Time readout -->
      <text x="246" y="12" font-size="9" fill="#475569">02.4s / 04.0s</text>
      <text x="314" y="12" font-size="9" fill="#059669" text-anchor="end">24 FPS</text>
    </g>

    <!-- Playback controls vector paths -->
    <g transform="translate(150, 248)" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 10,6 L 4,11 L 10,16 M 4,6 V 16" />
      <path d="M 20,6 V 16 M 25,6 V 16" stroke-width="2" />
      <path d="M 35,6 L 41,11 L 35,16 M 41,6 V 16" />
    </g>
  </g>

  <!-- Bottom Log & Generation Output Panel -->
  <g transform="translate(310, 350)" class="ui-font">
    <rect width="350" height="90" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#soft-shadow)" />
    
    <rect x="0" y="0" width="4" height="90" rx="2" fill="url(#brand-grad)" />

    <!-- Output log details -->
    <text x="18" y="22" font-size="10.5" font-weight="700" fill="#7c3aed">System Render Log</text>
    <text x="18" y="40" font-size="9.5" fill="#475569">✓ Processed user facial markers using ImagePreProcessor</text>
    <text x="18" y="54" font-size="9.5" fill="#475569">✓ Local LTX-Video engine invoked (Virtual Threads enabled)</text>
    <text x="18" y="68" font-size="9.5" fill="#059669">✓ Complete render payload cached dynamically (TTL 3600s)</text>

    <!-- Spinning indicator (using native rotate animation around its center x=232, y=20) -->
    <circle cx="232" cy="20" r="8" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="24 8">
      <animateTransform attributeName="transform" type="rotate" from="0 232 20" to="360 232 20" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Export Button -->
    <rect x="256" y="10" width="76" height="20" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1" />
    <text x="294" y="23" font-size="9.5" font-weight="600" fill="#7c3aed" text-anchor="middle">Export MP4</text>
  </g>
</svg>
