<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Terminal Headers -->
    <linearGradient id="term-header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eaecf0" />
      <stop offset="100%" stop-color="#d0d5dd" />
    </linearGradient>
    
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap');
      
      .font-mono {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
      }
      .font-ui {
        font-family: 'Outfit', sans-serif;
      }

      /* Cursor blinking */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s infinite steps(2, start);
      }

      /* Animated logging lines simulation (Opacity-only to prevent translate coordinate collapse) */
      @keyframes fade-in-line {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      .line-1 { animation: fade-in-line 0.3s forwards; }
      .line-2 { opacity: 0; animation: fade-in-line 0.3s forwards 0.2s; }
      .line-3 { opacity: 0; animation: fade-in-line 0.3s forwards 0.4s; }
      .line-4 { opacity: 0; animation: fade-in-line 0.3s forwards 0.6s; }
      .line-5 { opacity: 0; animation: fade-in-line 0.3s forwards 0.8s; }
      .line-6 { opacity: 0; animation: fade-in-line 0.3s forwards 1.0s; }
      .line-7 { opacity: 0; animation: fade-in-line 0.3s forwards 1.2s; }
      .line-8 { opacity: 0; animation: fade-in-line 0.3s forwards 1.4s; }
      .line-9 { opacity: 0; animation: fade-in-line 0.3s forwards 1.6s; }
      .line-10 { opacity: 0; animation: fade-in-line 0.3s forwards 1.8s; }
    ]]></style>
  </defs>

  <!-- Frame Background (Terminal Window Body) -->
  <rect width="800" height="420" rx="14" fill="#ffffff" />
  <rect x="0.5" y="0.5" width="799" height="419" rx="13.5" stroke="#e2e8f0" stroke-width="1" />

  <!-- Window Header -->
  <path d="M 14,0 L 786,0 A 14,14 0 0,1 800,14 L 800,42 L 0,42 L 0,14 A 14,14 0 0,1 14,0 Z" fill="url(#term-header)" />
  <line x1="0" y1="42" x2="800" y2="42" stroke="#e2e8f0" stroke-width="1" />

  <!-- Mac Control Dots -->
  <circle cx="22" cy="21" r="6" fill="#ff5f56" />
  <circle cx="40" cy="21" r="6" fill="#ffbd2e" />
  <circle cx="58" cy="21" r="6" fill="#27c93f" />

  <!-- Header Title -->
  <text x="400" y="26" class="font-ui" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">💻 Terminal — orasaka-cli --interactive</text>

  <!-- Terminal Body Content -->
  <g class="font-mono" font-size="12.5" fill="#1e293b" transform="translate(24, 66)">
    <!-- Command Input -->
    <g class="line-1">
      <text x="0" y="15" fill="#ca8a04" font-weight="700">user@orasaka-node ~ %</text>
      <text x="160" y="15" fill="#4f46e5" font-weight="600">orasaka-cli --query="I want a movie for tonight with my girlfriend for a relaxing evening..."</text>
    </g>

    <!-- Pipeline Startup Logs -->
    <g transform="translate(0, 30)">
      <g class="line-2">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#7c3aed" font-weight="700">INFO </text>
        <text x="125" y="15" fill="#2563eb">com.orasaka.gateway.Orchestrator</text>
        <text x="355" y="15" fill="#475569">: Active Virtual Thread detected. Starting Context Matrix assembly...</text>
      </g>
    </g>

    <!-- Context Interception Phase -->
    <g transform="translate(0, 50)">
      <g class="line-3">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#059669" font-weight="700">STAGE1</text>
        <text x="135" y="15" fill="#b45309">UserContextResolver</text>
        <text x="270" y="15" fill="#334155">: Authenticated User JD (preferences parsed: EN language, exclusions=Horror)</text>
      </g>
    </g>

    <g transform="translate(0, 70)">
      <g class="line-4">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#059669" font-weight="700">STAGE2</text>
        <text x="135" y="15" fill="#b45309">SystemContextInjector</text>
        <text x="280" y="15" fill="#334155">: Injected 2 active system providers (env=production, user_tier=premium)</text>
      </g>
    </g>

    <g transform="translate(0, 90)">
      <g class="line-5">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#059669" font-weight="700">STAGE3</text>
        <text x="135" y="15" fill="#b45309">RefinerInterceptor</text>
        <text x="270" y="15" fill="#334155">: Refined prompt: "Select romantic comedy or relax-themed films for couple post-dinner"</text>
      </g>
    </g>

    <!-- Cache hit & Tool Execution -->
    <g transform="translate(0, 115)">
      <g class="line-6">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#0891b2" font-weight="700">CACHE </text>
        <text x="135" y="15" fill="#d97706">CachingToolCallback</text>
        <text x="285" y="15" fill="#166534">: Cache HIT (passive Caffeine L1). Retrieved 3 media records (TTL remaining: 2400s)</text>
      </g>
    </g>

    <!-- Gateway Core Delegate -->
    <g transform="translate(0, 135)">
      <g class="line-7">
        <text x="0" y="15" fill="#64748b">[18:16:04]</text>
        <text x="80" y="15" fill="#7c3aed" font-weight="700">DELEG </text>
        <text x="135" y="15" fill="#6d28d9">AiClientFacade</text>
        <text x="245" y="15" fill="#334155">: Dispatched payload to core client (llama3 model backend)</text>
      </g>
    </g>

    <!-- SSE Stream Response Header -->
    <g transform="translate(0, 165)">
      <g class="line-8">
        <text x="0" y="15" fill="#db2777" font-weight="700">STREAMING RESPONSE:</text>
        <line x1="165" y1="11" x2="740" y2="11" stroke="#db2777" stroke-dasharray="3" stroke-width="1.5" />
      </g>
    </g>

    <!-- Stream content blocks -->
    <g transform="translate(0, 190)">
      <g class="line-9">
        <text x="10" y="15" fill="#0f172a" font-weight="600">● About Time (Netflix)</text>
        <text x="180" y="15" fill="#166534">[98% Match]</text>
        <text x="10" y="32" fill="#475569">  A beautiful, cozy time-travel romance that is perfect for a relaxing evening.</text>
        <text x="10" y="48" fill="#475569">  It features a heartwarming story about love, family, and appreciating the small</text>
        <text x="10" y="64" fill="#475569">  moments of daily life. Highly aligned with your 'relaxing evening' preference.</text>
      </g>
    </g>

    <g transform="translate(0, 275)">
      <g class="line-10">
        <text x="10" y="15" fill="#0f172a" font-weight="600">● La La Land (Prime Video)</text>
        <text x="210" y="15" fill="#166534">[94% Match]</text>
        <text x="10" y="32" fill="#475569">  A stunning musical romance about an aspiring actress and a jazz pianist.</text>
        
        <!-- Terminal Input Line (Active command awaiting next query) -->
        <text x="0" y="65" fill="#ca8a04" font-weight="700">user@orasaka-node ~ %</text>
        <rect class="cursor" x="160" y="52" width="7" height="15" fill="#0f172a" />
      </g>
    </g>
  </g>
</svg>
