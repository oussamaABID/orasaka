<svg width="800" height="180" viewBox="0 0 800 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Importing Premium Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&amp;family=Share+Tech+Mono&amp;family=Syne:wght@800;900&amp;display=swap');
      
      /* Theme-aware CSS Variables for GitHub Light / Dark Modes */
      :root {
        --text-primary: #0F172A;
        --text-secondary: #475569;
        --border-color: #E2E8F0;
        --border-active: url(#orasaka-logo-grad);
        --reactor-ring: #E2E8F0;
        --grid-bg: rgba(248, 250, 252, 0.6);
        --wordmark-stroke: rgba(15, 23, 42, 0.06);
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --text-primary: #F8FAFC;
          --text-secondary: #94A3B8;
          --border-color: #1E293B;
          --border-active: url(#orasaka-logo-grad);
          --reactor-ring: #1E293B;
          --grid-bg: rgba(11, 15, 23, 0.6);
          --wordmark-stroke: transparent;
        }
      }

      .font-wordmark {
        font-family: 'Syne', 'Orbitron', 'Inter', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
      }
      .font-hud {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-weight: 700;
      }
      .font-tagline {
        font-family: 'Orbitron', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
      }
      
      /* Smooth Animations */
      @keyframes spin-cw {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-ccw {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @keyframes core-pulse {
        0%, 100% { transform: scale(0.96); opacity: 0.95; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      @keyframes selector-sweep {
        0%, 20% { transform: translate(0px, 0px); }
        25%, 45% { transform: translate(86px, 0px); }
        50%, 70% { transform: translate(172px, 0px); }
        75%, 95% { transform: translate(258px, 0px); }
        100% { transform: translate(0px, 0px); }
      }

      .anim-spin-cw {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin-cw 35s linear infinite;
      }
      .anim-spin-ccw {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin-ccw 22s linear infinite;
      }
      .anim-pulse-core {
        transform-box: fill-box;
        transform-origin: center;
        animation: core-pulse 2.8s ease-in-out infinite;
      }
      .anim-selector {
        animation: selector-sweep 12s infinite;
      }
    </style>

    <!-- Core Dynamic Neon Gradient (Violet -> Cyan -> Emerald) -->
    <linearGradient id="orasaka-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Violet -->
      <stop offset="50%" stop-color="#06b6d4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald -->
    </linearGradient>

    <!-- Subtle glow filter for the central core -->
    <filter id="core-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- ═══ LEFT COLUMN: REACTOR CORE ICON (Aligned with Orasaka UI Logo) ═══ -->
  <g transform="translate(220, 90)">
    <!-- Outer Focus Corner Brackets (Jarvis Vibe) -->
    <path d="M-64 -64 H-52 M-64 -64 V-52" stroke="var(--border-color)" stroke-width="0.8" opacity="0.4" />
    <path d="M64 -64 H52 M64 -64 V-52" stroke="var(--border-color)" stroke-width="0.8" opacity="0.4" />
    <path d="M-64 64 H-52 M-64 64 V52" stroke="var(--border-color)" stroke-width="0.8" opacity="0.4" />
    <path d="M64 64 H52 M64 64 V52" stroke="var(--border-color)" stroke-width="0.8" opacity="0.4" />

    <!-- Technical HUD Axis Readouts -->
    <text x="-62" y="-68" class="font-hud" font-size="6" fill="var(--text-secondary)" opacity="0.7">X_22.CORE</text>
    <text x="62" y="70" class="font-hud" font-size="6" fill="var(--text-secondary)" text-anchor="end" opacity="0.7">SYS_1.1.6</text>

    <!-- Static Radial Gauge Ticks -->
    <g stroke="var(--border-color)" stroke-width="0.75" opacity="0.3">
      <line x1="0" y1="-54" x2="0" y2="-50" />
      <line x1="0" y1="50" x2="0" y2="54" />
      <line x1="-54" y1="0" x2="-50" y2="0" />
      <line x1="50" y1="0" x2="54" y2="0" />
      <line x1="-38" y1="-38" x2="-35" y2="-35" />
      <line x1="35" y1="35" x2="38" y2="38" />
      <line x1="38" y1="-38" x2="35" y2="-35" />
      <line x1="-35" y1="35" x2="-38" y2="38" />
    </g>

    <!-- Centered Scaled Group of the Official UI Logo -->
    <g transform="scale(1.15) translate(-50, -50)">
      <!-- Alignment circles -->
      <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border-color)" stroke-opacity="0.3" stroke-width="0.5" stroke-dasharray="2 2" />
      <circle cx="50" cy="50" r="30" fill="none" stroke="var(--border-color)" stroke-opacity="0.2" stroke-width="0.5" />

      <!-- Clockwise Rotating Outer Rings representing multi-tier architecture -->
      <g class="anim-spin-cw" style="animation-duration: 30s;">
        <!-- Ring 1 (Client/Gateway layer) -->
        <path d="M 50,10 A 40,40 0 0,1 90,50" fill="none" stroke="url(#orasaka-logo-grad)" stroke-width="4" stroke-linecap="round" />
        
        <!-- Ring 2 (Core stateless layer) -->
        <path d="M 90,50 A 40,40 0 0,1 50,90" fill="none" stroke="url(#orasaka-logo-grad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 6 10 6" />
        
        <!-- Ring 3 (Caching/RAG layer) -->
        <path d="M 50,90 A 40,40 0 0,1 10,50" fill="none" stroke="url(#orasaka-logo-grad)" stroke-width="4" stroke-linecap="round" />
        
        <!-- Connecting bridge notches (Cyberpunk details) -->
        <path d="M 10,50 A 40,40 0 0,1 30,16" fill="none" stroke="url(#orasaka-logo-grad)" stroke-width="4" stroke-linecap="round" />

        <!-- Tech crosshairs/nodes -->
        <line x1="50" y1="5" x2="50" y2="15" stroke="url(#orasaka-logo-grad)" stroke-width="1.5" stroke-linecap="round" />
        <line x1="50" y1="85" x2="50" y2="95" stroke="url(#orasaka-logo-grad)" stroke-width="1.5" stroke-linecap="round" />
        <line x1="5" y1="50" x2="15" y2="50" stroke="url(#orasaka-logo-grad)" stroke-width="1.5" stroke-linecap="round" />
        <line x1="85" y1="50" x2="95" y2="50" stroke="url(#orasaka-logo-grad)" stroke-width="1.5" stroke-linecap="round" />
      </g>

      <!-- Counter-Clockwise Rotating Inner Hexagon Shield -->
      <g class="anim-spin-ccw" style="animation-duration: 20s;">
        <polygon points="50,22 74,36 74,64 50,78 26,64 26,36" fill="none" stroke="url(#orasaka-logo-grad)" stroke-width="1.5" stroke-opacity="0.5" />
      </g>

      <!-- Pulsing Central Core Node (State/AI Engine) -->
      <g class="anim-pulse-core">
        <circle cx="50" cy="50" r="10" fill="url(#orasaka-logo-grad)" filter="url(#core-glow)" />
      </g>
    </g>
  </g>

  <!-- ═══ RIGHT COLUMN: TYPOGRAPHY & PIPELINE FLOW ═══ -->
  <g transform="translate(300, 70)">
    <!-- Small HUD System Prefix -->
    <text x="0" y="-44" class="font-hud" font-size="7" fill="url(#orasaka-logo-grad)" letter-spacing="2">SYS.INIT // CORE_CLIENT</text>
    
    <!-- Wordmark (Theme Adaptive & Slanted) -->
    <g transform="skewX(-14)">
      <text x="0" y="0" class="font-wordmark" font-size="52" fill="url(#orasaka-logo-grad)" stroke="var(--wordmark-stroke)" stroke-width="0.8" letter-spacing="12">ORASAKA</text>
    </g>

    <!-- Tagline Strike Line -->
    <line x1="0" y1="12" x2="338" y2="12" stroke="var(--border-color)" stroke-width="0.8" />
    
    <!-- Muted Tagline -->
    <text x="0" y="24" class="font-tagline" font-size="10" fill="var(--text-secondary)" letter-spacing="4.5">NATIVE AI ORCHESTRATION ENGINE</text>

    <!-- 4-Slot Interceptor Selector Grid (Jarvis-style Interactive HUD Buttons) -->
    <g transform="translate(0, 42) skewX(-14)">
      <!-- Slot 1: USER -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="80" height="22" rx="1" fill="var(--grid-bg)" />
        <path d="M0 5 V0 H5 M75 0 H80 V5 M0 17 V22 H5 M75 22 H80 V17" stroke="var(--border-color)" stroke-width="0.75" fill="none" />
        <circle cx="7" cy="11" r="1.5" fill="var(--border-color)" opacity="0.4" />
        <text x="44" y="14" class="font-hud" font-size="8" fill="var(--text-secondary)" text-anchor="middle">USR.RES</text>
      </g>
      <!-- Slot 2: SYSTEM -->
      <g transform="translate(86, 0)">
        <rect x="0" y="0" width="80" height="22" rx="1" fill="var(--grid-bg)" />
        <path d="M0 5 V0 H5 M75 0 H80 V5 M0 17 V22 H5 M75 22 H80 V17" stroke="var(--border-color)" stroke-width="0.75" fill="none" />
        <circle cx="7" cy="11" r="1.5" fill="var(--border-color)" opacity="0.4" />
        <text x="44" y="14" class="font-hud" font-size="8" fill="var(--text-secondary)" text-anchor="middle">SYS.INJ</text>
      </g>
      <!-- Slot 3: REFINER -->
      <g transform="translate(172, 0)">
        <rect x="0" y="0" width="80" height="22" rx="1" fill="var(--grid-bg)" />
        <path d="M0 5 V0 H5 M75 0 H80 V5 M0 17 V22 H5 M75 22 H80 V17" stroke="var(--border-color)" stroke-width="0.75" fill="none" />
        <circle cx="7" cy="11" r="1.5" fill="var(--border-color)" opacity="0.4" />
        <text x="44" y="14" class="font-hud" font-size="8" fill="var(--text-secondary)" text-anchor="middle">CTX.REF</text>
      </g>
      <!-- Slot 4: ROUTER -->
      <g transform="translate(258, 0)">
        <rect x="0" y="0" width="80" height="22" rx="1" fill="var(--grid-bg)" />
        <path d="M0 5 V0 H5 M75 0 H80 V5 M0 17 V22 H5 M75 22 H80 V17" stroke="var(--border-color)" stroke-width="0.75" fill="none" />
        <circle cx="7" cy="11" r="1.5" fill="var(--border-color)" opacity="0.4" />
        <text x="44" y="14" class="font-hud" font-size="8" fill="var(--text-primary)" text-anchor="middle">AI.RTE</text>
      </g>

      <!-- Sweeping Active Target Selector Overlay (Jarvis Active Target Focus Box) -->
      <g class="anim-selector">
        <path d="M-1.5 5.5 V-1.5 H5.5 M74.5 -1.5 H81.5 V5.5 M-1.5 16.5 V23.5 H5.5 M74.5 23.5 H81.5 V16.5" stroke="var(--border-active)" stroke-width="1.2" fill="none" />
        <circle cx="7" cy="11" r="2.2" fill="var(--border-active)" />
      </g>
    </g>
  </g>

  <!-- Bounding Corner Accents (Subtle Graphite) -->
  <path d="M 15 25 L 15 15 L 25 15" stroke="var(--border-color)" stroke-width="1" opacity="0.4" />
  <path d="M 785 25 L 785 15 L 775 15" stroke="var(--border-color)" stroke-width="1" opacity="0.4" />
  <path d="M 15 155 L 15 165 L 25 165" stroke="var(--border-color)" stroke-width="1" opacity="0.4" />
  <path d="M 785 155 L 785 165 L 775 165" stroke="var(--border-color)" stroke-width="1" opacity="0.4" />
</svg>