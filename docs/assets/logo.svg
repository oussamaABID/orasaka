<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep obsidian -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Gold metallic gradient for the wordmark -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DEB3" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#8B6914" />
    </linearGradient>

    <!-- Animated shine sweep across text -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="40%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFACD" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
      <animateTransform attributeName="gradientTransform" type="translate" from="-1.5 0" to="1.5 0"
        dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Glow filter for accents -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feFlood flood-color="#D4AF37" flood-opacity="0.4" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle glow for the orb -->
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feFlood flood-color="#D4AF37" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip for shine overlay -->
    <clipPath id="textClip">
      <text x="260" y="155" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="82"
        font-weight="800" letter-spacing="16">OROSAKA</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" rx="12" fill="url(#bgGrad)" />

  <!-- Subtle grid lines -->
  <g stroke="#1E293B" stroke-width="0.4" opacity="0.3">
    <line x1="0" y1="70" x2="1000" y2="70" />
    <line x1="0" y1="210" x2="1000" y2="210" />
    <line x1="100" y1="0" x2="100" y2="280" stroke-dasharray="4 12" />
    <line x1="900" y1="0" x2="900" y2="280" stroke-dasharray="4 12" />
  </g>

  <!-- ═══ EMBLEM: Rotating orbital ring ═══ -->
  <g transform="translate(140, 140)">
    <!-- Outer orbital ring -->
    <circle r="52" stroke="#334155" stroke-width="0.8" fill="none" stroke-dasharray="3 9"
      opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s"
        repeatCount="indefinite" />
    </circle>

    <!-- Inner orbital ring (counter-rotate) -->
    <circle r="38" stroke="#475569" stroke-width="0.5" fill="none" stroke-dasharray="2 14"
      opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s"
        repeatCount="indefinite" />
    </circle>

    <!-- Core diamond shape -->
    <g filter="url(#orbGlow)">
      <path d="M0 -22 L14 0 L0 22 L-14 0 Z" fill="#D4AF37" opacity="0.9">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Orbiting dot -->
    <circle r="3" fill="#F5DEB3" filter="url(#goldGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s"
        repeatCount="indefinite" />
      <animate attributeName="cx" values="45" dur="8s" repeatCount="indefinite" />
    </circle>

    <!-- Crosshair lines -->
    <line y1="-30" y2="30" stroke="#334155" stroke-width="0.6" opacity="0.5" />
    <line x1="-30" x2="30" stroke="#334155" stroke-width="0.6" opacity="0.5" />
  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- Base gold text -->
  <text x="260" y="155" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="82"
    font-weight="800" letter-spacing="16" fill="url(#goldGrad)">OROSAKA</text>

  <!-- Animated shine overlay -->
  <rect x="0" y="0" width="1000" height="280" fill="url(#shine)" clip-path="url(#textClip)" />

  <!-- ═══ TAGLINE ═══ -->
  <text x="268" y="190" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11.5"
    font-weight="600" fill="#94A3B8" letter-spacing="8">THE INTELLIGENT CORE</text>

  <!-- ═══ NEURAL DATA STREAM (left of text) ═══ -->
  <g filter="url(#goldGlow)" opacity="0.6">
    <path d="M200 140 H250" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="2 6">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- ═══ NEURAL DATA STREAM (right side) ═══ -->
  <g filter="url(#goldGlow)" opacity="0.5">
    <path d="M820 140 H920" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="2 8">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="4s" repeatCount="indefinite" />
    </path>

    <!-- Traveling pulse dot 1 -->
    <circle r="2.5" fill="#D4AF37">
      <animateMotion path="M820,140 H920" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Traveling pulse dot 2 (offset) -->
    <circle r="2" fill="#F5DEB3">
      <animateMotion path="M820,140 H920" dur="2s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ═══ STATUS INDICATORS ═══ -->
  <!-- Version badge -->
  <g transform="translate(268, 215)">
    <rect width="58" height="18" rx="3" fill="#1E293B" stroke="#334155" stroke-width="0.5" />
    <text x="29" y="13" font-family="'Inter', monospace" font-size="9" font-weight="600"
      fill="#D4AF37" text-anchor="middle">v1.0.0-SNAPSHOT</text>
  </g>

  <!-- Status dot + text -->
  <g transform="translate(340, 215)">
    <circle cx="6" cy="9" r="3" fill="#22C55E">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="16" y="13" font-family="'Inter', sans-serif" font-size="9" font-weight="500"
      fill="#64748B">PILOT ALPHA</text>
  </g>

  <!-- Progress bar -->
  <g transform="translate(268, 242)">
    <rect width="120" height="2" rx="1" fill="#1E293B" />
    <rect width="0" height="2" rx="1" fill="#D4AF37">
      <animate attributeName="width" values="0;120;0" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- ═══ RIGHT SIDE: Rotating ring indicator ═══ -->
  <g transform="translate(920, 70)">
    <circle r="18" stroke="#334155" stroke-width="0.6" fill="none" stroke-dasharray="3 6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s"
        repeatCount="indefinite" />
    </circle>
    <circle r="3.5" fill="#D4AF37" opacity="0.8" filter="url(#goldGlow)">
      <animate attributeName="r" values="3;4.5;3" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Corner accent marks -->
  <path d="M20 20 H40 M20 20 V40" stroke="#334155" stroke-width="0.8" opacity="0.4" />
  <path d="M980 20 H960 M980 20 V40" stroke="#334155" stroke-width="0.8" opacity="0.4" />
  <path d="M20 260 H40 M20 260 V240" stroke="#334155" stroke-width="0.8" opacity="0.4" />
  <path d="M980 260 H960 M980 260 V240" stroke="#334155" stroke-width="0.8" opacity="0.4" />
</svg>