version: '3.8'

services:
  pgvector:
    image: ankane/pgvector:latest
    container_name: orasaka-pgvector
    environment:
      POSTGRES_DB: orasaka_knowledge
      POSTGRES_USER: orasaka
      POSTGRES_PASSWORD: cyber_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orasaka -d orasaka_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-debug-server:
    image: node:20-slim
    container_name: orasaka-mcp-debug
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "npm init -y && 
             npm install @modelcontextprotocol/sdk && 
             node -e '
               const { Server } = require(\"@modelcontextprotocol/sdk/server\");
               const server = new Server({ name: \"debug-server\", version: \"1.0.0\" });
               server.setRequestHandler(\"list_tools\", () => ({ tools: [{ name: \"echo\", description: \"Echo input\" }] }));
               server.listen().then(() => console.log(\"MCP Debug Server running on port 8080\"));
             '"
    ports:
      - "8080:8080"

volumes:
  pgvector_data:
