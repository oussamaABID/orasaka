spring:
  application:
    name: orasaka-automation-worker-test

  # H2 in-memory for test isolation — no PostgreSQL required
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: false

  quartz:
    job-store-type: memory

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

server:
  port: 0

logging:
  level:
    com.orasaka.automation: DEBUG
