spring:
  application:
    name: orasaka-automation-worker

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orasaka_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.scheduler.instanceName: OrasakaAutomationScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.threadPool.threadCount: 5

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

# Standalone Spring Boot module exposed health check at /actuator/health (port 8082)
server:
  port: ${PORT:8082}

logging:
  file:
    name: ${ORASAKA_AUTOMATION_WORKER_LOG:var/logs/automation-worker.log}
  logback:
    rollingpolicy:
      max-file-size: 1MB
      total-size-cap: 10MB
      max-history: 7
  level:
    com.orasaka.automation: DEBUG
    org.springframework.amqp: INFO
    org.quartz: INFO
