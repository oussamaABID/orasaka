# ============================================================================
# SonarCloud Configuration — orasaka-video-worker (Python)
# Token is injected via SONAR_TOKEN env var, never hardcoded.
# ============================================================================
sonar.projectKey=orasaka_orasaka-video-worker
sonar.organization=orasaka
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=app
sonar.sourceEncoding=UTF-8
sonar.language=py

# Exclusions
sonar.exclusions=\
  __pycache__/**,\
  *.pyc,\
  .venv/**,\
  venv/**

# Test files
sonar.tests=.
sonar.test.inclusions=test_*.py,**/test_*.py

# Coverage reports (pytest-cov output)
sonar.python.coverage.reportPaths=coverage.xml
