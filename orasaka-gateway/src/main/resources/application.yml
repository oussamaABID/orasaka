server:
  port: ${PORT:8080}

spring:
  application:
    name: orasaka-gateway
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_CHAT_MODEL:phi3:mini}
      image:
        options:
          model: ${SPRING_AI_OLLAMA_IMAGE_MODEL:stable-diffusion-xe}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orasaka_db}
    username: ${SPRING_DATASOURCE_USERNAME:orasaka_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:orasaka_secure_pass}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  graphql:
    graphiql:
      enabled: ${SPRING_GRAPHQL_GRAPHIQL_ENABLED:true}
    cors:
      allowed-origins: ${ORASAKA_GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "Authorization,Content-Type,X-Requested-With,X-Orasaka-Context"
      allow-credentials: true

orasaka:
  features:
    "[orasaka.core.chat.image]":
      enabled: true
      label: "Generate Image"
      icon: "image"
      uri-path: "/api/v1/chat/image"
      http-method: "POST"
      payload-template: "{\"prompt\":\"${prompt}\"}"
    "[orasaka.core.chat.speech]":
      enabled: true
      label: "Text to Speech"
      icon: "mic"
      uri-path: "/api/v1/chat/speech"
      http-method: "POST"
      payload-template: "{\"text\":\"${text}\"}"
    "[orasaka.core.media.vision]":
      enabled: true
      label: "Analyze Poster"
      icon: "image"
      uri-path: "/api/v1/media/analyze-image"
      http-method: "POST"
      payload-template: "{\"posterBase64\":\"${posterBase64}\",\"prompt\":\"${prompt}\"}"
    "[orasaka.core.media.audio]":
      enabled: true
      label: "Analyze Audio"
      icon: "mic"
      uri-path: "/api/v1/media/analyze-audio"
      http-method: "POST"
      payload-template: "{\"audioBase64\":\"${audioBase64}\",\"threadId\":\"${threadId}\"}"
    "[orasaka.core.chat.text]":
      enabled: true
      label: "Text Chat"
      icon: "chat"
      uri-path: "/api/v1/chat/stream"
      http-method: "POST"
      payload-template: "{\"prompt\":\"${prompt}\"}"
    "[orasaka.core.media.video]":
      enabled: true
      label: "Generate Video"
      icon: "video"
      uri-path: "/api/v1/ai/video"
      http-method: "POST"
      payload-template: "{\"prompt\":\"${prompt}\"}"
  gateway:
    cors:
      # Comma-separated list of allowed origins. Override via ORASAKA_GATEWAY_CORS_ALLOWED_ORIGINS env var.
      allowed-origins: ${ORASAKA_GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
    security:
      dev-bypass-id: ${ORASAKA_SECURITY_DEV_BYPASS_ID:user-mock}
      dev-bypass-enabled: ${ORASAKA_SECURITY_DEV_BYPASS_ENABLED:true}
  core:
    default-provider: "ollama"
    orchestration:
      enabled: ${ORASAKA_ORCHESTRATION_ENABLED:true}
      user-context:
        enabled: ${ORASAKA_USER_CONTEXT_ENABLED:true}
      system-context:
        enabled: ${ORASAKA_SYSTEM_CONTEXT_ENABLED:true}
      refiner:
        enabled: false
      router:
        enabled: true
        provider: ${ORASAKA_ROUTER_PROVIDER:ollama}
        model: ${ORASAKA_ROUTER_MODEL:llama3.1:8b}
        temperature: ${ORASAKA_ROUTER_TEMPERATURE:0.0}
    overrides:
      ollama:
        base-url: ${ORASAKA_OLLAMA_BASE_URL:http://localhost:11434}
        model: "llama3:8b"
        temperature: ${ORASAKA_OLLAMA_TEMPERATURE:0.7}
        extra:
          embedding-model: ${ORASAKA_OLLAMA_EMBEDDING_MODEL:nomic-embed-text:latest}
      localai:
        base-url: "http://localhost:8085"
        model: "stable-diffusion"
      localai-video:
        base-url: ${ORASAKA_VIDEO_BASE_URL:http://localhost:8086}
        model: "ltx-video"
      openai:
        base-url: ${ORASAKA_OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${ORASAKA_OPENAI_MODEL:gpt-4o}
        temperature: ${ORASAKA_OPENAI_TEMPERATURE:0.7}
  tools:
    configs:
      searchWeb:
        cache:
          enabled: true
          ttl-seconds: 3600
        rag:
          enabled: true
          chunker-type: MARKDOWN_CHUNKERS
          source-table: orasaka_tools_rag_source
  infrastructure:
    identity:
      email-verification:
        enabled: ${ORASAKA_EMAIL_VERIFICATION_ENABLED:true}
      interceptions:
        enabled: ${ORASAKA_INTERCEPTIONS_ENABLED:true}
        schemas:
          onboarding: "classpath:config/onboarding-schema.json"
          feedback: "classpath:config/feedback-schema.json"
    rate-limit:
      enabled: ${ORASAKA_RATE_LIMIT_ENABLED:false}
      redis-url: ${ORASAKA_REDIS_URL:redis://localhost:6379}
      default-tier: ${ORASAKA_RATE_LIMIT_DEFAULT_TIER:free}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.orasaka: ${LOGGING_LEVEL_ORASAKA:DEBUG}
    org.springframework.security: ${LOGGING_LEVEL_SECURITY:DEBUG}
