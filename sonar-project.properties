sonar.projectKey=oussamaABID_orasaka
sonar.organization=oa
sonar.host.url=https://sonarcloud.io

# Language-specific inclusions
sonar.inclusions=**/*.java,**/*.ts,**/*.tsx,**/*.js,**/*.py

# ─── Source directories (main code only — MUST be disjoint from sonar.tests) ─
sonar.sources=\
  orasaka-core/src/main,\
  orasaka-gateway/src/main,\
  orasaka-identity/src/main,\
  orasaka-persistence/app/src/main,\
  orasaka-persistence/identity/src/main,\
  orasaka-tools/src/main,\
  orasaka-workers/automation/src/main,\
  orasaka-interceptors/orasaka-interceptor-translation/src/main,\
  orasaka-interceptors/orasaka-interceptor-validation/src/main,\
  orasaka-interceptors/orasaka-interceptor-reformulation/src/main,\
  orasaka-ui/src,\
  orasaka-cli/src

# ─── Test directories (MUST be disjoint from sonar.sources) ──────────────────
sonar.tests=\
  orasaka-core/src/test,\
  orasaka-gateway/src/test,\
  orasaka-identity/src/test,\
  orasaka-persistence/app/src/test,\
  orasaka-persistence/identity/src/test,\
  orasaka-tools/src/test,\
  orasaka-workers/automation/src/test

# Frontend test files live inside sonar.sources dirs — exclude via pattern
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Compiled binaries for Java
sonar.java.binaries=**/target/classes
sonar.java.test.binaries=**/target/test-classes

# Java Version
sonar.java.source=21

# Java libraries (compiled dependencies for precise analysis)
sonar.java.libraries=**/target/dependency/*.jar

# Coverage reporting paths (for Java)
sonar.coverage.jacoco.xmlReportPaths=orasaka-core/target/site/jacoco/jacoco.xml,orasaka-identity/target/site/jacoco/jacoco.xml,orasaka-tools/target/site/jacoco/jacoco.xml,orasaka-persistence/app/target/site/jacoco/jacoco.xml,orasaka-persistence/identity/target/site/jacoco/jacoco.xml,orasaka-workers/automation/target/site/jacoco/jacoco.xml,orasaka-gateway/target/site/jacoco/jacoco.xml

# Coverage reporting paths (for JavaScript/TypeScript)
sonar.javascript.lcov.reportPaths=orasaka-ui/coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/target/**,\
  **/.venv/**,\
  **/.next/**,\
  **/dist/**,\
  var/**,\
  scratch/**,\
  **/build-wrapper-dump.json

# Coverage exclusions — stateless infrastructure plumbing only.
# JPA entities (structural DB schema mapping), persistence converters (type adapters),
# infrastructure config (Spring bean wiring), and application bootstrap entry points.
sonar.coverage.exclusions=\
  **/infrastructure/persistence/entity/**,\
  **/infrastructure/persistence/converter/**,\
  **/infrastructure/config/**,\
  **/Application.java,\
  **/Mapper.java,\
  **/*Mapper.java

# Duplication exclusions — i18n translation dictionaries have inherent locale-to-locale duplication
sonar.cpd.exclusions=\
  **/translations.ts

# ─── Rule Suppressions ───────────────────────────────────────────────────────
# S100: Method naming convention — suppressed for test classes (industry standard)
# Test methods use descriptive camelCase/underscore names for readability
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

sonar.issue.ignore.multicriteria.e1.ruleKey=java:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/**/*.java

# S5693: Content length > 8MB — legitimate for media upload gateway (100MB cap)
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S5693
sonar.issue.ignore.multicriteria.e2.resourceKey=**/application.yml

# S1874: FormEvent deprecated — suppressed per AGENTS.md §3.1 [ERR-121].
# React.FormEvent<HTMLFormElement> is the mandated industry-standard pattern.
# The @deprecated annotation in @types/react is an upstream opinion conflict,
# not a correctness issue. All form onSubmit handlers use FormEvent.
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts
