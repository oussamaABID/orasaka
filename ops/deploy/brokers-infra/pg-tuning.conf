# PostgreSQL Tuning Parameters for Orasaka Production
# Optimized for heavy concurrent workloads and pgvector similarity index searches

# Connection settings
max_connections = 100

# Memory Configuration
shared_buffers = 1GB                    # 25% of 4GB RAM (Adjust based on instance class)
effective_cache_size = 3GB              # 75% of RAM
maintenance_work_mem = 256MB
work_mem = 64MB                         # Higher work_mem to support memory-heavy vector index builds (hnsw / ivfflat)
temp_buffers = 16MB

# Write-Ahead Log (WAL) settings
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 1GB

# Query Planner Settings
random_page_cost = 1.1                  # Optimized for SSDs (AWS EBS gp3/io2)
effective_io_concurrency = 200

# Vector Index Specifics
# Recommended pgvector HNSW settings:
# CREATE INDEX ON items USING hnsw (embedding vector_l2_ops) WITH (m = 16, ef_construction = 64);
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
max_parallel_workers = 4
