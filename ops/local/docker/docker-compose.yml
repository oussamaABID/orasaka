version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: orasaka-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orasaka_db}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
    command: postgres -c shared_buffers=256MB -c max_connections=100
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d ${POSTGRES_DB:-orasaka_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-debug-server:
    image: node:20-slim
    container_name: orasaka-mcp-debug
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "npm init -y && 
             npm install @modelcontextprotocol/sdk && 
             node -e '
               const { Server } = require(\"@modelcontextprotocol/sdk/server/index.js\");
               const { StdioServerTransport } = require(\"@modelcontextprotocol/sdk/server/stdio.js\");
               const { ListToolsRequestSchema } = require(\"@modelcontextprotocol/sdk/types.js\");
               const server = new Server({ name: \"debug-server\", version: \"1.0.0\" }, { capabilities: { tools: {} } });
               server.setRequestHandler(ListToolsRequestSchema, () => ({ tools: [{ name: \"echo\", description: \"Echo input\" }] }));
               require(\"http\").createServer((req, res) => res.end(\"ok\")).listen(8080);
               const transport = new StdioServerTransport();
               server.connect(transport).then(() => console.log(\"MCP Debug Server connected via Stdio\"));
             '"
    ports:
      - "8084:8080"

  redis:
    image: redis:7-alpine
    container_name: orasaka-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    container_name: orasaka-rabbitmq
    hostname: localhost
    environment:
      RABBITMQ_DEFAULT_USER: ${SPRING_RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${SPRING_RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  automation-worker:
    build:
      context: ../../..
      dockerfile: ops/local/docker/Dockerfile.automation-worker
    container_name: orasaka-automation-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-orasaka_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
    # ZERO INBOUND PORTS — internal mesh only
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgvector_data:
