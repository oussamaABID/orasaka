# ============================================================================
# SonarCloud Configuration — orasaka-cli (TypeScript CLI)
# Token is injected via SONAR_TOKEN env var, never hardcoded.
# ============================================================================
sonar.projectKey=orasaka_orasaka-cli
sonar.organization=orasaka
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions (from analysis)
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  **/*.test.ts,\
  **/__tests__/**

# Coverage exclusions (interactive I/O commands, config loaders, pure type defs, WS adapter)
sonar.coverage.exclusions=\
  src/commands/**,\
  src/types/**,\
  src/services/chat-stream.ws.ts,\
  src/index.ts,\
  src/env.ts

# Test files
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/__tests__/**

# Coverage reports (Jest lcov output)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
