# ============================================================================
# SonarCloud Configuration — orasaka-ui (Next.js / TypeScript)
# Token is injected via SONAR_TOKEN env var, never hardcoded.
# ============================================================================
sonar.projectKey=orasaka_orasaka-ui
sonar.organization=orasaka
sonar.host.url=https://sonarcloud.io

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions (from analysis)
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  dist/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/__tests__/**,\
  src/app/api/**

# Coverage exclusions (React components, layouts, config — not unit-testable without rendering)
sonar.coverage.exclusions=\
  src/app/**/*.tsx,\
  src/app/**/layout.tsx,\
  src/app/**/page.tsx,\
  src/components/**/*.tsx,\
  src/features/**/components/**/*.tsx,\
  src/core/context/translations.ts

# Test files
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/__tests__/**

# Coverage reports (Jest lcov output)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
