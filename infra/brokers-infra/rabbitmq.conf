# RabbitMQ Configuration for Orasaka Production

# Security Settings
loopback_users.guest = false           # Block default guest access on public interfaces

# Resource Limits
vm_memory_high_watermark.relative = 0.4 # Trigger memory alarm if usage exceeds 40% of RAM
disk_free_limit.relative = 1.5         # Trigger disk alarm if free space falls below 1.5x physical RAM

# Network & Ports
listeners.tcp.default = 5672           # AMQP port

# Management & Monitoring
management.tcp.port = 15672            # Web Management Portal port
management.tcp.ip = 0.0.0.0            # Restrict access at the security group level instead of binding here

# Log Management
log.console = true
log.console.level = info
log.file.level = warning
